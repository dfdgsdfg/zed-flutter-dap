name: CI

on:
  push:
    branches: [main, master]
    tags: ["dap-proxy-v*"]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy (native)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test

      - name: Build WASM (wasm32-wasip1)
        run: cargo build --target wasm32-wasip1

  check-linux:
    name: Linux smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Unit tests
        run: cargo test

      - name: Build WASM (wasm32-wasip1)
        run: cargo build --target wasm32-wasip1

  check-proxy:
    name: "dap-proxy: ${{ matrix.target }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: dap-proxy

      - name: Format check
        working-directory: dap-proxy
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: dap-proxy
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        working-directory: dap-proxy
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo test

      - name: Build
        working-directory: dap-proxy
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        if: startsWith(github.ref, 'refs/tags/dap-proxy-v')
        run: |
          mkdir -p dist
          cp dap-proxy/target/${{ matrix.target }}/release/dap-proxy dist/
          tar -czf dap-proxy-${{ matrix.target }}.tar.gz -C dist dap-proxy

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/dap-proxy-v')
        uses: actions/upload-artifact@v4
        with:
          name: dap-proxy-${{ matrix.target }}
          path: dap-proxy-${{ matrix.target }}.tar.gz

  release-proxy:
    name: Release dap-proxy
    needs: check-proxy
    if: startsWith(github.ref, 'refs/tags/dap-proxy-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dap-proxy-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dap-proxy-*.tar.gz
          generate_release_notes: true
